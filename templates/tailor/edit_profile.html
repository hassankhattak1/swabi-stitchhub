{% extends "base.html" %}

{% block title %}Edit Profile - StitchHub{% endblock %}

{% block content %}
<div class="container">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <h2>Edit Profile</h2>
        
        <form method="POST">
            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" class="form-control" value="{{ profile.location }}" required>
            </div>
            
            <div class="form-group">
                <label for="experience">Years of Experience</label>
                <input type="text" id="experience" name="experience" class="form-control" value="{{ profile.experience or '' }}">
            </div>
            
            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio" class="form-control" rows="4">{{ profile.bio or '' }}</textarea>
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Update Profile</button>
                <a href="{{ url_for('tailor.profile') }}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
