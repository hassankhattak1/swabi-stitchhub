{% extends "base.html" %}

{% block title %}Add Design - StitchHub{% endblock %}

{% block content %}
<div class="container">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <h2>Add New Design</h2>
        
        <form method="POST">
            <div class="form-group">
                <label for="title">Design Title</label>
                <input type="text" id="title" name="title" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" class="form-control" rows="3"></textarea>
            </div>
            
            <div class="form-group">
                <label for="image_url">Image URL</label>
                <input type="url" id="image_url" name="image_url" class="form-control" placeholder="https://example.com/image.jpg">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="price">Price (PKR)</label>
                    <input type="number" step="0.01" id="price" name="price" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-control">
                        <option value="suits">Suits</option>
                        <option value="shirts">Shirts</option>
                        <option value="trousers">Trousers</option>
                        <option value="kurti">Kurti</option>
                        <option value="shalwar">Shalwar</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Add Design</button>
                <a href="{{ url_for('tailor.designs') }}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
