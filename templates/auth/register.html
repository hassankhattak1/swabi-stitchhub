{% extends "base.html" %}

{% block title %}Register - StitchHub{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2><i class="fas fa-user-plus"></i> Register</h2>
        
        <form method="POST" action="{{ url_for('auth.register') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" class="form-control" required placeholder="e.g., 03001234567">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="role">Register as</label>
                <select id="role" name="role" class="form-control" onchange="toggleTailorFields()">
                    <option value="customer">Customer</option>
                    <option value="tailor">Tailor (Women Only)</option>
                </select>
            </div>
            
            <div id="tailor-fields" style="display: none;">
                <div class="form-group">
                    <label for="cnic">CNIC Number *</label>
                    <input type="text" id="cnic" name="cnic" class="form-control" placeholder="e.g., 1234567890123">
                </div>
                
                <div class="form-group">
                    <label for="location">Location (Swabi) *</label>
                    <input type="text" id="location" name="location" class="form-control" placeholder="e.g., Main Market, Swabi">
                </div>
                
                <div class="form-group">
                    <label for="experience">Years of Experience</label>
                    <input type="text" id="experience" name="experience" class="form-control" placeholder="e.g., 5 years">
                </div>
                
                <div class="form-group">
                    <label for="bio">Bio</label>
                    <textarea id="bio" name="bio" class="form-control" rows="3" placeholder="Tell customers about your expertise..."></textarea>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
        </form>
        
        <div class="auth-footer mt-2">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function toggleTailorFields() {
    const role = document.getElementById('role').value;
    const tailorFields = document.getElementById('tailor-fields');
    if (role === 'tailor') {
        tailorFields.style.display = 'block';
    } else {
        tailorFields.style.display = 'none';
    }
}
</script>
{% endblock %}
