{% extends "base.html" %}

{% block title %}Verify OTP - StitchHub{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2><i class="fas fa-mobile-alt"></i> Phone Verification</h2>
        <p class="text-center text-muted mb-3">
            Enter the 6-digit OTP sent to your phone number.<br>
            <small>Check the console for the OTP in development mode.</small>
        </p>
        
        <form method="POST" action="{{ url_for('auth.verify_otp') }}">
            <div class="form-group">
                <label for="otp">OTP Code</label>
                <input type="text" id="otp" name="otp" class="form-control" 
                       placeholder="Enter 6-digit OTP" maxlength="6" pattern="[0-9]{6}" required 
                       style="text-align: center; font-size: 1.5rem; letter-spacing: 5px;">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Verify OTP</button>
        </form>
        
        <div class="auth-footer mt-2">
            <p>Didn't receive the OTP? <a href="{{ url_for('auth.resend_otp') }}">Resend OTP</a></p>
            <p><a href="{{ url_for('auth.register') }}">Start Over</a></p>
        </div>
    </div>
</div>
{% endblock %}
